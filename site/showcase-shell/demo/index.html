<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Showcase Shell Demo</title>

  <!-- PSD3 Design System Variables (inline for demo) -->
  <style>
    :root {
      /* Brand colors */
      --psd3-gold: #b8860b;
      --psd3-gold-light: #daa520;
      --psd3-gold-dark: #8b6508;

      /* Background colors */
      --psd3-bg-page: #f8f8f8;
      --psd3-bg-card: #ffffff;
      --psd3-bg-subtle: #f0f0f0;

      /* Text colors */
      --psd3-text-primary: #1a1a1a;
      --psd3-text-body: #333333;
      --psd3-text-muted: #666666;
      --psd3-text-light: #888888;

      /* Border colors */
      --psd3-border: #e0e0e0;
      --psd3-border-light: #eeeeee;

      /* Spacing scale */
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;

      /* Typography */
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --text-sm: 0.875rem;

      /* Borders */
      --radius-sm: 0.125rem;
      --radius-md: 0.25rem;

      /* Shadows */
      --shadow-lg: 0 4px 8px rgba(0, 0, 0, 0.1);

      /* Transitions */
      --transition-fast: 150ms ease;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      color: var(--psd3-text-body);
      background: var(--psd3-bg-page);
    }
  </style>

  <!-- Showcase Shell CSS -->
  <link rel="stylesheet" href="../css/showcase-shell.css">

  <!-- Demo-specific styles -->
  <style>
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn--primary {
      background: var(--psd3-gold);
      color: white;
      border-color: var(--psd3-gold);
    }

    .btn--primary:hover {
      background: var(--psd3-gold-dark);
      border-color: var(--psd3-gold-dark);
    }

    .btn--secondary {
      background: var(--psd3-bg-card);
      color: var(--psd3-text-primary);
      border-color: var(--psd3-border);
    }

    .btn--secondary:hover {
      background: var(--psd3-bg-subtle);
    }
  </style>
</head>
<body>
  <script src="bundle.js"></script>
</body>
</html>
