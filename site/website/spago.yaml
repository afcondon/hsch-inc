workspace:
  # No packageSet - using solver mode to pull from live registry
  extraPackages:
    # These are NOT yet published to registry (in sibling repo)
    hylograph-tidal:
      path: "../../../purescript-hylograph-showcases/psd3-tilted-radio/purescript-psd\
        3-tidal"
    hylograph-showcase-shell:
      path: "../showcase-shell"
    html-parser-halogen:
      git: https://github.com/afcondon/purescript-html-parser-halogen.git
      ref: esmodules
      dependencies:
        - halogen
        - string-parsers

package:
  name: demo-website
  description: PSD3 documentation and examples website
  bundle:
    module: Hylograph.Main
    outfile: public/bundle.js
    platform: browser
  dependencies:
    - aff: ">=8.0.0 <9.0.0"
    - affjax: ">=13.0.0 <14.0.0"
    - affjax-web: ">=1.0.0 <2.0.0"
    - argonaut-codecs: ">=9.1.0 <10.0.0"
    - argonaut-core: ">=7.0.0 <8.0.0"
    - arrays: ">=7.3.0 <8.0.0"
    - bifunctors: ">=6.1.0 <7.0.0"
    - console: ">=6.1.0 <7.0.0"
    - const: ">=6.0.0 <7.0.0"
    - datetime: ">=6.1.0 <7.0.0"
    - debug: ">=6.0.2 <7.0.0"
    - dom-indexed: ">=13.0.0 <14.0.0"
    - effect: ">=4.0.0 <5.0.0"
    - either: ">=6.1.0 <7.0.0"
    - exceptions: ">=6.1.0 <7.0.0"
    - foldable-traversable: ">=6.0.0 <7.0.0"
