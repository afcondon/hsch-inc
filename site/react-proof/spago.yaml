workspace:
  # Solver mode - hylograph packages from registry
  extraPackages: {}

package:
  name: hylograph-react
  dependencies:
    - aff: ">=8.0.0 <9.0.0"
    - arrays: ">=7.3.0 <8.0.0"
    - effect: ">=4.0.0 <5.0.0"
    - exceptions: ">=6.1.0 <7.0.0"
    - foldable-traversable: ">=6.0.0 <7.0.0"
    - foreign-object: ">=4.1.0 <5.0.0"
    - hylograph-selection: ">=0.1.1 <0.2.0"
    - hylograph-simulation: ">=0.1.0 <0.2.0"
    - integers: ">=6.0.0 <7.0.0"
    - maybe: ">=6.0.0 <7.0.0"
    - nullable: ">=6.0.0 <7.0.0"
    - numbers: ">=9.0.1 <10.0.0"
    - ordered-collections: ">=3.2.0 <4.0.0"
    - prelude: ">=6.0.2 <7.0.0"
    - random: ">=6.0.0 <7.0.0"
    - react-basic: ">=17.0.0 <18.0.0"
    - react-basic-dom: ">=7.0.0 <8.0.0"
    - react-basic-hooks: ">=8.2.0 <9.0.0"
    - refs: ">=6.0.0 <7.0.0"
    - tuples: ">=7.0.0 <8.0.0"
    - web-dom: ">=6.0.0 <7.0.0"
    - web-html: ">=4.1.1 <5.0.0"
  build:
    strict: true
